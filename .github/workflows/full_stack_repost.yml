name: Comment on Workflows

on:
  pull_request_target:
    types: [opened, synchronized, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test_comment:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        test_name: ["Full Stack Tests", "Backend Unit Tests", "Frontend Unit Tests"]
        include:
          - test_name: "Full Stack Tests"
            workflow_file: "full_stack_tests.yml"
          - test_name: "Backend Unit Tests"
            workflow_file: "backend_unit_tests.yml"
          - test_name: "Frontend Unit Tests"
            workflow_file: "frontend_unit_tests.yml"
    steps:
      - name: Wait for Test Workflow to Complete
        id: wait
        uses: ArcticLampyrid/action-wait-for-workflow@v1.2.0
        with:
          workflow: ${{ matrix.workflow_file }}
          sha: ${{ github.event.pull_request.head.sha }}
          allowed-conclusions: |
            success
            failure
            action_required

      - name: Check for Manual Approval Requirement
        if: ${{ steps.wait.outputs.run-conclusion == 'action_required' }}
        run: |
          echo "::error::First-time contributor workflows require manual approval. After approval, please re-run the comment workflows to post the report."
          exit 1

      - name: Post Comment if Test Fails
        if: ${{ steps.wait.outputs.run-conclusion == 'failure' && !cancelled() }}
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🛠️ Hi @${{ github.event.pull_request.user.login }}, it looks like the **${{ matrix.test_name }}** are failing on your PR.
            Please check the logs and follow [these instructions](https://github.com/oppia/oppia/wiki/If-CI-checks-fail-on-your-PR#introduction)
            to fix the issues, or report the error as a flake. Thanks!
