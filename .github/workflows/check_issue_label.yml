name: Check Issue Labels

on:
  issues:
    types:
      - labeled

permissions: {}

jobs:
  check-label:
    runs-on: ubuntu-22.04
    permissions:
      issues: write
      # Ensure that the token has at least read:org permissions if needed.
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install he

      - name: Validate issue label
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // Require the he library for HTML escaping.
            const he = require('he');

            const labelName = context.payload.label?.name || '';
            const username = context.actor || '';
            // Explicitly convert the issue number to a number.
            const issueNumber = parseInt(context.issue.number, 10);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            console.log("Label Name:", labelName);
            console.log("Username:", username);
            console.log("Issue Number:", issueNumber);

            // Validate the label name.
            const isValidLabelName = /^[\w\s-:]+$/.test(labelName);
            if (!isValidLabelName) {
              throw new Error(`Invalid label name: ${labelName}`);
            }

            // Validate the issue number.
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              throw new Error(`Invalid issue number: ${context.issue.number}`);
            }

            // Validate the username.
            const isValidUsername = /^[a-zA-Z0-9-]+$/.test(username);
            if (!isValidUsername) {
              throw new Error(`Invalid username: ${username}`);
            }

            // A helper function to remove a label and create a comment.
            async function removeLabelAndComment(label, comment) {
              console.log(`Removing label: ${label}`);
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issueNumber,
                name: label
              }).catch(err => {
                console.error(`Error removing label: ${err.message}`);
                throw new Error(`Error removing label: ${err.message}`);
              });

              console.log(`Creating comment: ${comment}`);
              // Use the he library for HTML escaping to ensure safe comment text.
              const sanitizedComment = he.escape(comment);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: sanitizedComment
              }).catch(err => {
                console.error(`Error creating comment: ${err.message}`);
                throw new Error(`Error creating comment: ${err.message}`);
              });
            }

            // For "good first issue", dynamically fetch allowed team members
            // from the oppia-good-first-issue-labelers team.
            if (labelName === "good first issue") {
              // Team slug and org are hardcoded as they are expected to change rarely.
              const teamSlug = "oppia-good-first-issue-labelers";
              const orgName = "WorkVed Spaces Actions";
              console.log(`Fetching team members for team ${teamSlug} in organization ${orgName}`);
              let allowedUsers = [];
              try {
                const teamMembersResponse = await github.rest.teams.listMembersInOrg({
                  org: orgName,
                  team_slug: teamSlug
                });
                allowedUsers = teamMembersResponse.data.map(member => member.login);
                console.log("Allowed users from team:", allowedUsers);
              } catch (error) {
                throw new Error(`Error fetching team members for team '${teamSlug}': ${error.message}`);
              }
              const allowedUsersSet = new Set(allowedUsers);

              if (!allowedUsersSet.has(username)) {
                await removeLabelAndComment(
                  labelName,
                  `Hi @${username}, only users from the [oppia-good-first-issue-labelers](https://github.com/orgs/oppia/teams/oppia-good-first-issue-labelers) team can add the 'good first issue' label. Please reach out to them if needed. Thanks!`
                );
                throw new Error(`User @${username} is not permitted to add the 'good first issue' label.`);
              } else {
                console.log("User is allowed to add the 'good first issue' label.");
              }
            }

            // Define labels that should only be used in pull requests.
            const prLabels = new Set(["dependencies", "stale"]);

            // PR-related labels should not be added to issues.
            if (prLabels.has(labelName) || labelName.startsWith("PR:")) {
              await removeLabelAndComment(
                labelName,
                `Hi @${username}, the '${labelName}' label should only be used in pull requests. I'm removing the label. You can learn more about labels [here](https://github.com/oppia/oppia/wiki/Contributing-code-to-Oppia#labeling-issues-and-pull-requests). Thanks!`
              );
              throw new Error(`The label '${labelName}' is reserved for pull requests.`);
            }

      - name: Report failure if failed on oppia/oppia develop branch
        if: ${{ failure() && github.event_name == 'push' && github.repository == 'oppia/oppia' && github.ref == 'refs/heads/develop'}}
        uses: ./.github/actions/send-webhook-notification
        with:
          message: "Prettier formatting failed on the upstream develop branch."
          webhook-url: ${{ secrets.BUILD_FAILURE_ROOM_WEBHOOK_URL }}
