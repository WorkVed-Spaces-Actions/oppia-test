name: Assign Reviewer For Contributor

on:
  pull_request_target:
    types: [opened]

permissions: read-all

jobs:
  manage_reviewers:
    name: Manage Reviewers and Notifications
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Handle Reviewers and Notifications
        uses: actions/github-script@v7
        with:
          script: |
            // ======================
            // INPUT SANITIZATION
            // ======================
            const safeGet = (obj, path, fallback = null) => {
              return path.split('.').reduce((acc, key) => 
                (acc && acc[key] !== undefined) ? acc[key] : fallback, obj
              );
            };

            // Core PR metadata with validation
            const prContext = context.payload.pull_request || {};
            const repositoryContext = context.repo;
            
            // Validate repository context
            const repoOwner = (repositoryContext.owner || '').replace(/[^a-zA-Z0-9-]/g, '');
            const repoName = (repositoryContext.repo || '').replace(/[^a-zA-Z0-9-]/g, '');
            if (!repoOwner || !repoName) {
              throw new Error('Invalid repository context');
            }

            // Validate PR number
            const prNumber = Number.isInteger(prContext.number) ? prContext.number : 0;
            if (prNumber <= 0) {
              throw new Error(`Invalid PR number: ${prNumber}`);
            }

            // Sanitize PR author
            const prAuthor = safeGet(prContext, 'user.login', '') || '';
            const sanitizedAuthor = prAuthor.replace(/[^a-zA-Z0-9_-]/g, '');

            // ======================
            // CONTRIBUTOR CHECK
            // ======================
            const isNewContributor = await (async () => {
              try {
                const encodedAuthor = encodeURIComponent(`user:${sanitizedAuthor}`);
                const searchResults = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${repoOwner}/${repoName} type:pr is:merged ${encodedAuthor}`
                });
                return safeGet(searchResults, 'data.total_count', 0) === 0;
              } catch (error) {
                console.error('Contributor check failed:', error.message);
                return false;
              }
            })();

            // ======================
            // REVIEWER VALIDATION
            // ======================
            const validateGitHubUsername = (username) => 
              /^[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38}$/i.test(username);

            const requestedIndividualReviewers = 
              (safeGet(prContext, 'requested_reviewers', []) || [])
                .map(r => r?.login)
                .filter(username => validateGitHubUsername(username));

            const requestedTeamReviewers = 
              (safeGet(prContext, 'requested_teams', []) || [])
                .map(t => t?.slug)
                .filter(slug => /^[a-z\d](?:-?[a-z\d])+$/.test(slug));

            const hasIndividualReviewers = requestedIndividualReviewers.length > 0;
            const hasTeamReviewers = requestedTeamReviewers.length > 0;

            // ======================
            // REVIEWER ASSIGNMENT
            // ======================
            if (hasIndividualReviewers) {
              // Validate at least one valid reviewer exists
              const validReviewers = requestedIndividualReviewers
                .filter(username => validateGitHubUsername(username));

              if (validReviewers.length === 0) {
                throw new Error('No valid reviewers found');
              }

              await github.rest.issues.addAssignees({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                assignees: validReviewers
              });

              const firstReviewer = validReviewers[0];
              const assignmentMessage = `Assigning @${firstReviewer} for the first pass review of this PR. Thanks!`;
              
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body: assignmentMessage
              });
            }

            // ======================
            // NOTIFICATION SYSTEM
            // ======================
            if (!hasIndividualReviewers && !hasTeamReviewers) {
              const notificationMessage = `No individual reviewers or teams were found by GitHub. @oppia/dev-workflow-reviewers, could you please review the issue and assign an appropriate reviewer? Thank you!`;

              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body: notificationMessage
              });
            }

            // ======================
            // NEW CONTRIBUTOR GUIDANCE
            // ======================
            if (isNewContributor && sanitizedAuthor) {
              const guidanceMessage = `Hello @${sanitizedAuthor}! Thank you for making a PR.
              Please ensure your PR is assigned to the correct reviewers -- check the "Assignees" section in the sidebar on the right. Typically, this should match the "Reviewers" section.
              If it's not correct, you can leave a comment with the syntax \`@reviewer_username PTAL\` to request that a specific reviewer be assigned.`;

              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body: guidanceMessage
              });
            }


  check_pr_description:
    name: Validate PR Description Content
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Validate PR Content
        uses: actions/github-script@v7
        with:
          script: |
            const safeGet = (obj, path, fallback = null) => {
              return path.split('.').reduce((acc, key) => 
                (acc && acc[key] !== undefined) ? acc[key] : fallback, obj
              );
            };

            const prContext = context.payload.pull_request || {};
            const repositoryContext = context.repo;
            
            // Validate repository context
            const repoOwner = (repositoryContext.owner || '').replace(/[^a-zA-Z0-9-]/g, '');
            const repoName = (repositoryContext.repo || '').replace(/[^a-zA-Z0-9-]/g, '');
            if (!repoOwner || !repoName) {
              throw new Error('Invalid repository context');
            }

            const prNumber = Number.isInteger(prContext.number) ? prContext.number : 0;
            if (prNumber <= 0) {
              throw new Error(`Invalid PR number: ${prNumber}`);
            }

            const prAuthor = safeGet(prContext, 'user.login', '') || '';
            const sanitizedAuthor = prAuthor.replace(/[^a-zA-Z0-9_-]/g, '');
            const prBody = (prContext.body || '').toLowerCase();

            // Check for unmodified placeholder patterns
            const placeholderChecks = {
              'Issue Number': /#\[fill_in_number_here\]/i,
              'PR Description': /\[explain here what your pr does and why\]/i,
              'Bug Cause': /\[explain what the cause of the bug was/i,
              'Generic Placeholders': /\[[^\]]+\]/g
            };

            const missingElements = [];

            // Check specific overview points
            if (placeholderChecks['Issue Number'].test(prBody)) {
              missingElements.push('Issue number reference (#[fill_in_number_here])');
            }
            if (placeholderChecks['PR Description'].test(prBody)) {
              missingElements.push('PR purpose description ([Explain here...])');
            }
            if (placeholderChecks['Bug Cause'].test(prBody)) {
              missingElements.push('Bug cause explanation ([Explain what...])');
            }

            // Check for remaining generic placeholders in key sections
            const requiredSections = [
              '## Essential Checklist',
              '## Testing doc',
              '## Proof that changes are correct'
            ];

            requiredSections.forEach(section => {
              const sectionContent = prBody.split(section.toLowerCase())[1]?.split('##')[0] || '';
              const hasPlaceholders = placeholderChecks['Generic Placeholders'].test(sectionContent);
              if (hasPlaceholders) {
                missingElements.push(`Unfilled placeholders in ${section}`);
              }
            });

            // Create guidance comment if any placeholders found
            if (missingElements.length > 0) {
              const commentMessage = `Hi @${sanitizedAuthor}, please complete these required elements:\n${
                missingElements.map(e => `- ${e}`).join('\n')
              }\n\nGuidance:\n` +
                "1. For issue number: Add the relevant issue ID after # (e.g., #1234)\n" +
                "2. For PR description: Clearly explain your changes and their purpose\n" +
                "3. For bug fixes: Describe the root cause and reference the introducing PR\n" +
                "4. Remove all other square bracket placeholders from all sections";

              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body: commentMessage
              });
            }

  report-failure:
    name: Report Failure
    needs: [manage_reviewers, check_pr_description]
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.manage_reviewers.result == 'failure' || needs.check_pr_description.result == 'failure') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send notification
        uses: ./.github/actions/send-webhook-notification
        with:
          message: "Failed to Handle Reviewers and Notifications"
          webhook-url: ${{ secrets.BUILD_FAILURE_ROOM_WEBHOOK_URL }}
