  check_pr_description:
    name: Validate PR Description Content
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Template Compliance
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const REQUIRED_SECTIONS = {
              '## Overview': {
                validation: (body) => {
                  const overviewIndex = body.indexOf('## Overview');
                  if (overviewIndex === -1) return 'Missing Overview section';
                  
                  const explanation = body.split('\n').find(line => 
                    line.startsWith('2. This PR does the following:')
                  );
                  if (explanation && explanation.includes('[Explain here what your PR does and why]')) {
                    return 'Missing PR explanation in Overview';
                  }
                  return null;
                }
              },
              '## Essential Checklist': {
                validation: (body) => {
                  const checklistIndex = body.indexOf('## Essential Checklist');
                  if (checklistIndex === -1) return 'Missing Essential Checklist';
                  
                  const checklistContent = body.slice(checklistIndex);
                  const uncheckedItems = checklistContent.split('\n')
                    .filter(line => line.startsWith('- [ ]'));
                  
                  const errors = [];
                  if (uncheckedItems.some(line => line.includes('linter/Karma'))) {
                    errors.push('Karma/linter checks not passed locally');
                  }
                  if (uncheckedItems.some(line => line.includes('allow edits from maintainers'))) {
                    errors.push('"Allow edits from maintainers" not checked');
                  }
                  return errors.length > 0 ? errors.join(', ') : null;
                }
              },
              '## Proof that changes are correct': {
                validation: (body) => {
                  const proofIndex = body.indexOf('## Proof that changes are correct');
                  if (proofIndex === -1) return 'Missing Proof section';
                  
                  const proofContent = body.slice(proofIndex);
                  const hasMedia = proofContent.includes('http');
                  const hasExemption = /No\s+proof\s+of\s+changes\s+needed\s+because/mi.test(proofContent);
                  
                  if (!hasMedia && !hasExemption) {
                    return 'Missing proof media or valid exemption statement';
                  }
                  return null;
                }
              }
            };

            const PLACEHOLDER_REGEX = /\[[^\]]+\]/g;
            const BODY_SECTIONS = [
              '## Overview',
              '## Essential Checklist',
              '## Proof that changes are correct'
            ];

            // Main validation logic
            const validationErrors = [];
            const prBody = pr.body || '';

            // Check for remaining placeholders
            BODY_SECTIONS.forEach(section => {
              const sectionStart = prBody.indexOf(section);
              if (sectionStart === -1) return;
              
              const sectionEnd = prBody.indexOf('##', sectionStart + section.length);
              const sectionContent = prBody.slice(sectionStart, sectionEnd !== -1 ? sectionEnd : undefined);
              
              const placeholders = sectionContent.match(PLACEHOLDER_REGEX);
              if (placeholders) {
                validationErrors.push(`Unresolved placeholders in ${section}: ${placeholders.join(', ')}`);
              }
            });

            // Check required sections
            Object.entries(REQUIRED_SECTIONS).forEach(([section, { validation}]) => {
              const error = validation(prBody);
              if (error) validationErrors.push(`${section}: ${error}`);
            });

            // Create comment if errors found
            if (validationErrors.length > 0) {
              const commentBody = [
                `Hi @${pr.user.login}, please address these template issues:`,
                ...validationErrors.map(error => `- ${error}`),
                'See our [contributing guidelines](https://github.com/oppia/oppia/wiki/Make-a-pull-request) for details.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: commentBody
              });
            }


  report-failure:
    name: Report Failure
    needs: [manage_reviewers, check_pr_description]
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.manage_reviewers.result == 'failure' || needs.check_pr_description.result == 'failure') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send notification
        uses: ./.github/actions/send-webhook-notification
        with:
          message: "Failed to Handle Reviewers and Notifications"
          webhook-url: ${{ secrets.BUILD_FAILURE_ROOM_WEBHOOK_URL }}
