name: Assign Reviewers on PTAL Comment

on:
  issue_comment:
    types: [created]

jobs:
  assign-reviewers:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Assign reviewers
        uses: actions/github-script@v6
        with:
          script: |
            // Strict sanitization functions
            const sanitizeUsername = (input) => {
              const allowed = /^[a-z\d](?:[a-z\d]|-(?=[a-z\d])){0,38}$/i;
              return typeof input === 'string' 
                ? (allowed.test(input) ? input.trim() : '')
                : '';
            };

            const sanitizeRepo = (input) => {
              const allowed = /^[A-Za-z0-9_.-]{1,100}$/;
              return typeof input === 'string'
                ? (allowed.test(input) ? input.trim() : '')
                : '';
            };

            const sanitizePrNumber = (num) => {
              const n = Number(num);
              return Number.isInteger(n) && n > 0 ? n : NaN;
            };

            // Validate context payload
            const validateContext = () => {
              if (!context.payload || !context.payload.issue || !context.payload.repository) {
                core.setFailed('Invalid event payload structure');
                return false;
              }
              return true;
            };

            if (!validateContext()) return;

            // Sanitize PR number
            const rawPrNumber = context.payload.issue?.number;
            const prNumber = sanitizePrNumber(rawPrNumber);
            if (isNaN(prNumber)) {
              core.setFailed(`Invalid PR number: ${rawPrNumber}`);
              return;
            }

            // Sanitize repository info
            const rawRepo = context.payload.repository?.name;
            const rawOwner = context.payload.repository?.owner?.login;
            const repo = sanitizeRepo(rawRepo);
            const owner = sanitizeUsername(rawOwner); // Owner follows username rules
            
            if (!repo || !owner) {
              core.setFailed(`Invalid repository (${repo}) or owner (${owner})`);
              return;
            }

            // Sanitize comment content
            const rawComment = context.payload.comment?.body || '';
            const comment = rawComment.trim().slice(0, 1000); // Limit length

            // Enhanced regex with strict boundaries
            const reviewerPattern = /^((?:@[\w-]+[\s,]*)+)\s+(ptal|take\s+a\s+pass|please\s+review)\b/i;
            const match = comment.match(reviewerPattern);
            if (!match) {
              console.log('No valid PTAL pattern found');
              return;
            }

            // Process reviewers with strict validation
            const reviewers = match[1]
              .split(/[\s,]+/g)
              .map(u => u.replace(/^@+/, '')) // Remove leading @
              .map(sanitizeUsername)
              .filter(u => u.length > 0 && u !== owner); // Filter invalid and self-assign

            if (reviewers.length === 0) {
              console.log('No valid reviewers after sanitization');
              return;
            }

            try {
              // Verify PR existence first
              const { data: prData } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: prNumber
              });

              if (!prData.pull_request) {
                core.setFailed('Issue is not a pull request');
                return;
              }

              // Get current assignees with sanitization
              const currentAssignees = prData.assignees
                .map(a => sanitizeUsername(a.login))
                .filter(Boolean);

              // Create deduplicated list
              const newAssignees = [...new Set([...currentAssignees, ...reviewers])];

              // Update assignees using proper API endpoint
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: prNumber,
                assignees: reviewers // API handles deduplication internally
              });

              // Post confirmation with sanitized output
              const safeMessage = `Assigned reviewers: ${reviewers.map(u => `@${u}`).join(', ')}`;
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: safeMessage.slice(0, 500) // Limit comment length
              });

            } catch (error) {
              core.setFailed(`API Error: ${error.message}`);
            }

  report-failure:
    needs: assign-reviewers
    runs-on: ubuntu-latest
    if: ${{ always() && needs.assign-reviewers.result == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - name: Send notification
        uses: ./.github/actions/send-webhook-notification
        with:
          message: "Failed to assign reviewers in PR workflow"
          webhook-url: ${{ secrets.BUILD_FAILURE_ROOM_WEBHOOK_URL }}
